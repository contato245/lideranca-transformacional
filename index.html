document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2d2c1b06-76c0-4e89-9fc8-6a85d9fe334b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    /* Brand */\n    --cyan: #2EB6D6;\n    --cyan-soft: #5ECbe2;\n    --lime: #CFD63A;\n    --teal-dark: #184860;\n\n    /* Surfaces */\n    --bg: #0F2A33;\n    --bg-deep: #0C2128;\n    --card: #143641;\n    --card-hi: #1B4351;\n    --line: rgba(234, 245, 244, 0.10);\n    --line-strong: rgba(234, 245, 244, 0.18);\n\n    /* Text */\n    --cream: #EAF5F4;\n    --muted: #9FBAC0;\n    --muted-dim: #74929A;\n\n    --maxw: 1180px;\n    --r: 18px;\n    --r-lg: 26px;\n    --ease: cubic-bezier(0.22, 1, 0.36, 1);\n    --shadow: 0 24px 60px -28px rgba(0,0,0,0.7);\n  }\n\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n\n  html { scroll-behavior: smooth; scroll-padding-top: 136px; }\n\n  body {\n    font-family: 'Hanken Grotesk', system-ui, sans-serif;\n    background: var(--bg);\n    color: var(--cream);\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n\n  ::selection { background: var(--lime); color: var(--teal-dark); }\n\n  h1, h2, h3, h4 {\n    font-family: 'Bricolage Grotesque', sans-serif;\n    line-height: 1.04;\n    letter-spacing: -0.02em;\n    font-weight: 700;\n  }\n\n  em { font-style: italic; color: var(--cyan-soft); font-weight: 500; }\n\n  a { color: inherit; text-decoration: none; }\n  img { max-width: 100%; display: block; }\n\n  .wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }\n\n  section { position: relative; }\n\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: 10px;\n    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.16em;\n    text-transform: uppercase; color: var(--cyan);\n    margin-bottom: 20px;\n  }\n  .eyebrow::before {\n    content: \"\"; width: 26px; height: 2px; background: var(--lime); border-radius: 2px;\n  }\n\n  /* ============ BUTTONS ============ */\n  .btn {\n    display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n    font-family: 'Hanken Grotesk', sans-serif;\n    font-weight: 700; font-size: 1rem;\n    padding: 15px 28px; border-radius: 100px;\n    cursor: pointer; border: none;\n    transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease), background 0.3s var(--ease);\n    white-space: nowrap;\n  }\n  .btn-primary {\n    background: var(--lime); color: var(--teal-dark);\n    box-shadow: 0 12px 30px -12px rgba(207,214,58,0.6);\n  }\n  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 18px 38px -12px rgba(207,214,58,0.75); }\n  .btn-outline {\n    background: transparent; color: var(--cream);\n    border: 1.5px solid rgba(46,182,214,0.55);\n  }\n  .btn-outline:hover { border-color: var(--cyan); background: rgba(46,182,214,0.10); transform: translateY(-3px); }\n  .btn svg { width: 18px; height: 18px; }\n\n  /* ============ NAV ============ */\n  header.nav {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n    transition: background 0.4s var(--ease), backdrop-filter 0.4s var(--ease), border-color 0.4s var(--ease), box-shadow 0.4s var(--ease);\n    border-bottom: 1px solid transparent;\n  }\n  header.nav.scrolled {\n    background: rgba(12, 33, 40, 0.82);\n    backdrop-filter: blur(16px) saturate(140%);\n    -webkit-backdrop-filter: blur(16px) saturate(140%);\n    border-bottom: 1px solid var(--line);\n    box-shadow: 0 10px 30px -20px rgba(0,0,0,0.8);\n  }\n  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 124px; gap: 24px; }\n  .nav-logo img { height: 96px; width: auto; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.4)); }\n  .nav-links { display: flex; align-items: center; gap: 34px; }\n  .nav-links a.link {\n    font-size: 0.96rem; font-weight: 500; color: var(--muted);\n    position: relative; transition: color 0.25s ease;\n  }\n  .nav-links a.link::after {\n    content: \"\"; position: absolute; left: 0; bottom: -6px; height: 2px; width: 0;\n    background: var(--lime); border-radius: 2px; transition: width 0.3s var(--ease);\n  }\n  .nav-links a.link:hover { color: var(--cream); }\n  .nav-links a.link:hover::after { width: 100%; }\n  .nav-cta { display: flex; align-items: center; gap: 14px; }\n  .nav-cta .btn { padding: 11px 22px; font-size: 0.94rem; }\n\n  .burger { display: none; background: none; border: none; cursor: pointer; padding: 8px; }\n  .burger span { display: block; width: 24px; height: 2px; background: var(--cream); border-radius: 2px; transition: 0.3s var(--ease); }\n  .burger span + span { margin-top: 6px; }\n\n  /* mobile menu */\n  .mobile-menu {\n    position: fixed; inset: 0; z-index: 99;\n    background: rgba(12, 33, 40, 0.97);\n    backdrop-filter: blur(20px);\n    -webkit-backdrop-filter: blur(20px);\n    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;\n    opacity: 0; pointer-events: none; transition: opacity 0.4s var(--ease);\n  }\n  .mobile-menu.open { opacity: 1; pointer-events: auto; }\n  .mobile-menu a { font-family: 'Bricolage Grotesque', sans-serif; font-size: 2rem; font-weight: 700; padding: 12px; color: var(--cream); }\n  .mobile-menu a:active { color: var(--lime); }\n  .mobile-menu .btn { margin-top: 18px; font-size: 1.1rem; }\n\n  /* ============ HERO ============ */\n  .hero { padding: 150px 0 90px; overflow: hidden; background-color: #0F2A33; background-image: url(/hero.jpg); background-size: cover; background-position: center; background-repeat: no-repeat; }\n  .hero-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; background: linear-gradient(180deg, rgba(15,42,51,0.45) 0%, rgba(15,42,51,0.65) 45%, rgba(15,42,51,0.90) 80%, #0F2A33 100%); }\n  .glow { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.5; }\n  .glow.cyan { width: 620px; height: 620px; background: radial-gradient(circle, rgba(46,182,214,0.55), transparent 65%); top: -180px; right: -120px; }\n  .glow.lime { width: 520px; height: 520px; background: radial-gradient(circle, rgba(207,214,58,0.34), transparent 65%); top: 180px; left: -180px; }\n  .grid-tex {\n    position: absolute; inset: 0;\n    background-image: linear-gradient(rgba(234,245,244,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(234,245,244,0.035) 1px, transparent 1px);\n    background-size: 64px 64px;\n    mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 30%, transparent 80%);\n    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 30%, transparent 80%);\n  }\n  .hero-inner { position: relative; z-index: 1; text-align: center; max-width: 920px; margin: 0 auto; }\n  .hero-logo { height: clamp(165px, 30vw, 285px); width: auto; margin: 0 auto 34px; filter: drop-shadow(0 8px 40px rgba(46,182,214,0.25)); }\n  .hero h1 {\n    font-size: clamp(1.9rem, 5.2vw, 3.5rem);\n    max-width: 18ch; margin: 0 auto;\n    text-wrap: balance;\n  }\n  .hero h1 .grad { color: var(--cyan-soft); }\n  .hero-support {\n    font-size: clamp(1.05rem, 2.4vw, 1.4rem);\n    color: var(--muted); margin-top: 22px; font-style: italic;\n    text-wrap: pretty;\n  }\n  .chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 34px; }\n  .chip {\n    display: inline-flex; align-items: center; gap: 9px;\n    background: rgba(46,182,214,0.08); border: 1px solid var(--line-strong);\n    color: var(--cream); padding: 9px 17px; border-radius: 100px;\n    font-size: 0.92rem; font-weight: 500;\n  }\n  .chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 10px var(--lime); }\n  .hero-cta { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-top: 40px; }\n\n  /* ============ SECTION SHELL ============ */\n  .sec { padding: clamp(72px, 11vw, 130px) 0; }\n  .sec.deep { background: var(--bg-deep); }\n  .sec-head { max-width: 760px; }\n  .sec-head.center { margin: 0 auto; text-align: center; }\n  .sec-head h2 { font-size: clamp(1.8rem, 4.4vw, 2.9rem); text-wrap: balance; }\n  .sec-head p { color: var(--muted); font-size: clamp(1.02rem, 2vw, 1.18rem); margin-top: 20px; text-wrap: pretty; }\n\n  /* ============ SOBRE ============ */\n  .sobre-text {\n    font-size: clamp(1.15rem, 2.6vw, 1.6rem);\n    line-height: 1.5; color: var(--cream); max-width: 22ch;\n    font-family: 'Bricolage Grotesque', sans-serif; font-weight: 400; letter-spacing: -0.01em;\n  }\n  .sobre-grid { display: grid; grid-template-columns: 0.85fr 1.15fr; gap: clamp(36px, 6vw, 80px); align-items: start; }\n  .sobre-body p { color: var(--muted); font-size: 1.12rem; }\n  .sobre-body p + p { margin-top: 18px; }\n\n  /* ============ PARA QUEM ============ */\n  .who-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 54px; }\n  .who-card {\n    background: var(--card); border: 1px solid var(--line); border-radius: var(--r);\n    padding: 30px 26px; transition: transform 0.35s var(--ease), border-color 0.35s var(--ease), background 0.35s var(--ease);\n  }\n  .who-card:hover { transform: translateY(-6px); border-color: rgba(46,182,214,0.4); background: var(--card-hi); }\n  .who-ic {\n    width: 52px; height: 52px; border-radius: 14px;\n    display: grid; place-items: center; margin-bottom: 18px;\n    background: rgba(46,182,214,0.10); border: 1px solid rgba(46,182,214,0.25);\n  }\n  .who-ic svg { width: 26px; height: 26px; stroke: var(--cyan); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }\n  .who-card h3 { font-size: 1.18rem; font-weight: 600; }\n\n  /* ============ JORNADA / TRAIL ============ */\n  .trail { position: relative; margin-top: 64px; }\n  .trail-spine {\n    position: absolute; left: 31px; top: 12px; bottom: 12px; width: 3px;\n    background: linear-gradient(180deg, var(--cyan), var(--lime));\n    border-radius: 3px; opacity: 0.45;\n  }\n  .trail-fill {\n    position: absolute; left: 31px; top: 12px; width: 3px;\n    background: linear-gradient(180deg, var(--cyan), var(--lime));\n    border-radius: 3px; height: 0; transition: height 0.2s linear;\n    box-shadow: 0 0 16px rgba(207,214,58,0.5);\n  }\n  .enc { position: relative; padding-left: 92px; padding-bottom: 30px; }\n  .enc:last-child { padding-bottom: 0; }\n  .node {\n    position: absolute; left: 0; top: 4px;\n    width: 64px; height: 64px; border-radius: 50%;\n    display: grid; place-items: center;\n    background: var(--bg); border: 2px solid var(--line-strong);\n    font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800;\n    font-size: 1.6rem; color: var(--muted-dim);\n    transition: all 0.4s var(--ease); z-index: 2;\n  }\n  .enc.active .node, .enc:hover .node {\n    color: var(--teal-dark); background: var(--lime); border-color: var(--lime);\n    box-shadow: 0 0 0 6px rgba(207,214,58,0.14), 0 0 26px rgba(207,214,58,0.4);\n    transform: scale(1.04);\n  }\n  .enc-card {\n    background: var(--card); border: 1px solid var(--line); border-radius: var(--r-lg);\n    padding: clamp(24px, 3.4vw, 36px);\n    transition: transform 0.4s var(--ease), border-color 0.4s var(--ease), box-shadow 0.4s var(--ease);\n  }\n  .enc-card:hover { transform: translateY(-5px); border-color: rgba(46,182,214,0.38); box-shadow: var(--shadow); }\n  .enc-date {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--cyan); margin-bottom: 12px;\n  }\n  .enc-card h3 { font-size: clamp(1.3rem, 2.8vw, 1.85rem); }\n  .enc-card .desc { color: var(--muted); margin-top: 14px; font-size: 1.06rem; max-width: 62ch; }\n  .enc-tags { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 22px; }\n  .tag {\n    font-size: 0.82rem; font-weight: 600; padding: 6px 13px; border-radius: 100px;\n    background: rgba(207,214,58,0.10); color: var(--lime); border: 1px solid rgba(207,214,58,0.22);\n  }\n\n  /* ============ METODOLOGIA ============ */\n  .princ-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 52px; }\n  .princ {\n    background: var(--card); border: 1px solid var(--line); border-radius: var(--r);\n    padding: 28px; transition: transform 0.35s var(--ease), border-color 0.35s var(--ease);\n  }\n  .princ:hover { transform: translateY(-5px); border-color: rgba(207,214,58,0.35); }\n  .princ .num { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 0.95rem; color: var(--lime); letter-spacing: 0.08em; }\n  .princ h3 { font-size: 1.22rem; font-weight: 600; margin: 14px 0 8px; }\n  .princ p { color: var(--muted); font-size: 0.98rem; }\n  .metodo-note {\n    margin-top: 34px; padding: 22px 26px; border-radius: var(--r);\n    background: rgba(46,182,214,0.07); border: 1px dashed rgba(46,182,214,0.3);\n    color: var(--muted); font-size: 1.02rem;\n  }\n  .metodo-note strong { color: var(--cream); font-weight: 700; }\n\n  /* ============ DETALHES ============ */\n  .detail-card {\n    background: linear-gradient(135deg, var(--card-hi), var(--card));\n    border: 1px solid var(--line-strong); border-radius: var(--r-lg);\n    padding: clamp(30px, 4vw, 52px); box-shadow: var(--shadow);\n    display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 48px;\n  }\n  .detail-row { display: flex; gap: 18px; padding: 22px 0; border-bottom: 1px solid var(--line); align-items: flex-start; }\n  .detail-row .di {\n    width: 44px; height: 44px; flex: 0 0 44px; border-radius: 12px; display: grid; place-items: center;\n    background: rgba(207,214,58,0.10); border: 1px solid rgba(207,214,58,0.25);\n  }\n  .detail-row .di svg { width: 22px; height: 22px; stroke: var(--lime); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }\n  .detail-row .dlabel { font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-dim); font-weight: 700; }\n  .detail-row .dval { font-size: 1.12rem; font-weight: 600; color: var(--cream); margin-top: 3px; }\n  .detail-row .dval span.fill { color: var(--cyan); }\n\n  /* ============ INSCRIÇÃO ============ */\n  .insc { background: var(--bg-deep); overflow: hidden; }\n  .insc-card {\n    position: relative; z-index: 1;\n    background: var(--card); border: 1px solid var(--line-strong); border-radius: var(--r-lg);\n    padding: clamp(32px, 5vw, 64px); text-align: center; max-width: 840px; margin: 0 auto;\n    box-shadow: var(--shadow);\n  }\n  .insc h2 { font-size: clamp(2rem, 5.5vw, 3.4rem); }\n  .insc h2 em { color: var(--lime); }\n  .insc p.lead { color: var(--muted); font-size: 1.15rem; margin-top: 16px; max-width: 52ch; margin-left: auto; margin-right: auto; }\n  .form-slot {\n    margin-top: 38px; min-height: 220px; border-radius: var(--r);\n    border: 2px dashed rgba(46,182,214,0.35); background: rgba(46,182,214,0.04);\n    display: grid; place-items: center; padding: 40px 24px; color: var(--muted-dim);\n    font-family: 'Hanken Grotesk', sans-serif;\n  }\n  .form-slot .slot-inner { max-width: 420px; }\n  .form-slot code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.85rem; color: var(--cyan); background: rgba(46,182,214,0.10); padding: 3px 8px; border-radius: 6px; }\n  .insc .btn-primary { margin-top: 30px; font-size: 1.08rem; padding: 17px 36px; }\n  .insc-note { margin-top: 18px; font-size: 0.92rem; color: var(--muted-dim); }\n\n  /* ============ FOOTER ============ */\n  footer.ft { padding: 70px 0 46px; border-top: 1px solid var(--line); }\n  .ft-grid { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; gap: 36px; }\n  .ft-logo img { height: 40px; width: auto; margin-bottom: 16px; }\n  .ft-tag { color: var(--muted); max-width: 32ch; }\n  .ft-right { text-align: right; }\n  .ft-right .fl { display: block; color: var(--muted); font-size: 0.96rem; margin-bottom: 8px; transition: color 0.25s; }\n  .ft-right .fl:hover { color: var(--cyan); }\n  .ft-bottom { margin-top: 48px; padding-top: 26px; border-top: 1px solid var(--line); display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; color: var(--muted-dim); font-size: 0.88rem; }\n\n  /* ============ REVEAL ============ */\n  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s var(--ease), transform 0.7s var(--ease); }\n  .reveal.in { opacity: 1; transform: none; }\n  .reveal.d1 { transition-delay: 0.08s; }\n  .reveal.d2 { transition-delay: 0.16s; }\n  .reveal.d3 { transition-delay: 0.24s; }\n  .reveal.d4 { transition-delay: 0.32s; }\n  .reveal.d5 { transition-delay: 0.40s; }\n\n  @media (prefers-reduced-motion: reduce) {\n    html { scroll-behavior: auto; }\n    .reveal { opacity: 1; transform: none; transition: none; }\n  }\n\n  /* ============ RESPONSIVE ============ */\n  @media (max-width: 940px) {\n    .sobre-grid { grid-template-columns: 1fr; gap: 28px; }\n    .sobre-text { max-width: 30ch; }\n    .who-grid { grid-template-columns: repeat(2, 1fr); }\n    .princ-grid { grid-template-columns: repeat(2, 1fr); }\n    .detail-card { grid-template-columns: 1fr; }\n  }\n  @media (max-width: 760px) {\n    .nav-links, .nav-cta .btn { display: none; }\n    .burger { display: block; }\n    .hero { padding: 130px 0 70px; }\n    .enc { padding-left: 0; }\n    .trail-spine, .trail-fill { display: none; }\n    .node { position: relative; top: 0; left: 0; margin-bottom: 16px; width: 54px; height: 54px; font-size: 1.35rem; }\n    .ft-right { text-align: left; }\n    .ft-grid { flex-direction: column; }\n  }\n  @media (max-width: 480px) {\n    .who-grid, .princ-grid { grid-template-columns: 1fr; }\n    .wrap { padding: 0 20px; }\n  }\n.quem-layout { display: grid; grid-template-columns: 0.85fr 1.15fr; gap: clamp(36px, 6vw, 72px); align-items: center; } .quem-media { position: relative; } .quem-accent { position: absolute; right: -20px; bottom: -20px; width: 72%; height: 72%; border-radius: 28px; background: linear-gradient(135deg, var(--cyan), var(--lime)); opacity: 0.30; z-index: 0; } .quem-photo { position: relative; z-index: 1; width: 100%; max-width: 440px; aspect-ratio: 369 / 404; object-fit: cover; border-radius: 24px; border: 1px solid var(--line-strong); box-shadow: var(--shadow); } .quem-content h2 { font-size: clamp(1.8rem, 4.4vw, 2.9rem); text-wrap: balance; } .quem-lead { color: var(--muted); font-size: clamp(1.02rem, 2vw, 1.18rem); margin-top: 18px; text-wrap: pretty; } .quem-list { list-style: none; margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; } .quem-list li { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1.04rem; color: var(--cream); } .qdot { width: 10px; height: 10px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 10px var(--lime); flex: 0 0 10px; } @media (max-width: 900px) { .quem-layout { grid-template-columns: 1fr; gap: 30px; } .quem-photo { max-width: 420px; margin-left: auto; margin-right: auto; } .quem-accent { display: none; } .quem-list { grid-template-columns: 1fr; } } <\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ===================== NAV ===================== -->\n<header class=\"nav\" id=\"nav\">\n  <div class=\"wrap nav-inner\">\n    <a href=\"#top\" class=\"nav-logo\" aria-label=\"Liderança Transformacional — início\">\n      <img src=\"a7e916a3-b488-4dbf-89dc-67438cec7217\" alt=\"Liderança Transformacional\">\n    <\u002Fa>\n    <nav class=\"nav-links\">\n      <a class=\"link\" href=\"#programa\">Programa<\u002Fa>\n      <a class=\"link\" href=\"#encontros\">Encontros<\u002Fa>\n      <a class=\"link\" href=\"#inscricao\">Inscrição<\u002Fa>\n    <\u002Fnav>\n    <div class=\"nav-cta\">\n      <a class=\"btn btn-primary\" href=\"#inscricao\">Inscreva-se<\u002Fa>\n    <\u002Fdiv>\n    <button class=\"burger\" id=\"burger\" aria-label=\"Abrir menu\" aria-expanded=\"false\">\n      <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"mobile-menu\" id=\"mobileMenu\">\n  <a href=\"#programa\">Programa<\u002Fa>\n  <a href=\"#encontros\">Encontros<\u002Fa>\n  <a href=\"#inscricao\">Inscrição<\u002Fa>\n  <a class=\"btn btn-primary\" href=\"#inscricao\">Inscreva-se<\u002Fa>\n<\u002Fdiv>\n\n<!-- ===================== HERO ===================== -->\n<section class=\"hero\" id=\"top\" data-screen-label=\"Hero\">\n  <div class=\"hero-bg\" aria-hidden=\"true\">\n    <div class=\"grid-tex\"><\u002Fdiv>\n    <div class=\"glow cyan\"><\u002Fdiv>\n    <div class=\"glow lime\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap hero-inner\">\n    <img class=\"hero-logo reveal in\" src=\"a7e916a3-b488-4dbf-89dc-67438cec7217\" alt=\"Liderança Transformacional\">\n    <h1 class=\"reveal in d1\">Um programa de desenvolvimento de líderes em <span class=\"grad\">6 encontros ao vivo.<\u002Fspan><\u002Fh1>\n    <p class=\"hero-support reveal in d2\"><em>Liderança que transforma começa de dentro para fora.<\u002Fem><\u002Fp>\n    <div class=\"chips reveal in d3\">\n      <span class=\"chip\"><span class=\"dot\"><\u002Fspan>100% online<\u002Fspan>\n      <span class=\"chip\"><span class=\"dot\"><\u002Fspan>6 encontros<\u002Fspan>\n      <span class=\"chip\"><span class=\"dot\"><\u002Fspan>Agosto 2026<\u002Fspan>\n      <span class=\"chip\"><span class=\"dot\"><\u002Fspan>ao vivo via Google Meet<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"hero-cta reveal in d4\">\n      <a class=\"btn btn-primary\" href=\"#inscricao\">Quero me inscrever\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n      <a class=\"btn btn-outline\" href=\"#encontros\">Conhecer a jornada<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== SOBRE ===================== -->\n<section class=\"sec\" id=\"programa\" data-screen-label=\"Sobre o programa\">\n  <div class=\"wrap\">\n    <div class=\"sobre-grid\">\n      <div class=\"reveal\">\n        <span class=\"eyebrow\">Sobre o programa<\u002Fspan>\n        <p class=\"sobre-text\">Você desenvolve o líder <em>por dentro<\u002Fem> para liderar melhor por fora.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sobre-body reveal d1\">\n        <p>A liderança transformacional nasce da maturidade emocional, da identidade e do propósito — a base para influenciar pessoas e ambientes com coerência.<\u002Fp>\n        <p>Esta não é uma fórmula rígida nem uma terapia: é uma <em>jornada prática<\u002Fem> de consciência, clareza e transformação, construída sobre os princípios de valorização humana da Oliveira Foundation.<\u002Fp>\n        <p>Ao longo de seis encontros, você desenvolve o líder por dentro para liderar melhor por fora — em casa, no trabalho e na comunidade.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== PARA QUEM ===================== -->\n<section class=\"sec deep\" data-screen-label=\"Para quem é\"><div class=\"wrap\"><div class=\"quem-layout\"><div class=\"quem-media reveal\"><div class=\"quem-accent\"></div><img src=\"/quem.jpg\" alt=\"Liderança e mentoria\" class=\"quem-photo\"></div><div class=\"quem-content reveal d1\"><span class=\"eyebrow\">Para quem é</span><h2>Para quem influencia <em>pessoas</em> todos os dias</h2><p class=\"quem-lead\">Se há gente olhando para você como referência, este programa é para você — independente do título no crachá.</p><ul class=\"quem-list\"><li><span class=\"qdot\"></span>Líderes sociais e comunitários</li><li><span class=\"qdot\"></span>Educadores e professores</li><li><span class=\"qdot\"></span>Líderes e gestores de empresas</li><li><span class=\"qdot\"></span>Coordenadores de equipes</li><li><span class=\"qdot\"></span>Empreendedores</li><li><span class=\"qdot\"></span>Quem influencia pessoas no dia a dia</li></ul></div></div></div></section>\n\n<!-- ===================== JORNADA ===================== -->\n<section class=\"sec\" id=\"encontros\" data-screen-label=\"A jornada — 6 encontros\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"eyebrow\">A jornada<\u002Fspan>\n      <h2>Os 6 encontros<\u002Fh2>\n      <p>Uma trilha progressiva: cada encontro constrói sobre o anterior, do alicerce emocional à influência cotidiana.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"trail\" id=\"trail\">\n      <div class=\"trail-spine\" aria-hidden=\"true\"><\u002Fdiv>\n      <div class=\"trail-fill\" id=\"trailFill\" aria-hidden=\"true\"><\u002Fdiv>\n\n      <article class=\"enc reveal\">\n        <div class=\"node\">1<\u002Fdiv>\n        <div class=\"enc-card\">\n          <span class=\"enc-date\">Ter, 04 ago<\u002Fspan>\n          <h3>Inteligência Emocional e Confronto em Amor<\u002Fh3>\n          <p class=\"desc\">A base emocional do líder. Inteligência emocional aplicada à liderança e às relações, e o \"confronto em amor\" como ferramenta de maturidade: dizer a verdade protegendo o vínculo. <em>O conflito é inevitável; a ruptura é opcional.<\u002Fem><\u002Fp>\n          <div class=\"enc-tags\"><span class=\"tag\">Inteligência emocional<\u002Fspan><span class=\"tag\">Conversas corajosas<\u002Fspan><span class=\"tag\">Cultura da honra<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"enc reveal\">\n        <div class=\"node\">2<\u002Fdiv>\n        <div class=\"enc-card\">\n          <span class=\"enc-date\">Qui, 06 ago<\u002Fspan>\n          <h3>Mentalidade, Identidade e Transformação<\u002Fh3>\n          <p class=\"desc\">Como crenças e padrões se formam — e por que padrões repetidos não são identidade. O modelo Raízes–Caule–Frutos (identidade → maturidade → resultados) como chave de transformação. <em>O fruto só revela o que está na raiz.<\u002Fem><\u002Fp>\n          <div class=\"enc-tags\"><span class=\"tag\">Mentalidade<\u002Fspan><span class=\"tag\">Identidade<\u002Fspan><span class=\"tag\">Raízes–Caule–Frutos<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"enc reveal\">\n        <div class=\"node\">3<\u002Fdiv>\n        <div class=\"enc-card\">\n          <span class=\"enc-date\">Ter, 11 ago<\u002Fspan>\n          <h3>Perfis Comportamentais (DISC) e Relações<\u002Fh3>\n          <p class=\"desc\">Autoconhecimento e leitura do outro. Os quatro perfis DISC como tendências (nunca rótulos), os pilares da inteligência emocional e o clima emocional das relações. <em>Liderança é influência, não cargo.<\u002Fem><\u002Fp>\n          <div class=\"enc-tags\"><span class=\"tag\">DISC<\u002Fspan><span class=\"tag\">Relações humanas<\u002Fspan><span class=\"tag\">Comunicação<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"enc reveal\">\n        <div class=\"node\">4<\u002Fdiv>\n        <div class=\"enc-card\">\n          <span class=\"enc-date\">Qui, 13 ago<\u002Fspan>\n          <h3>Inteligência Emocional na Prática<\u002Fh3>\n          <p class=\"desc\">Transformar emoção em decisão consciente: sentir → pensar → agir. Priorizar o que é importante, urgente e circunstancial, gerir a energia e prevenir a sobrecarga do líder. <em>A emoção é força; a maturidade é direção.<\u002Fem><\u002Fp>\n          <div class=\"enc-tags\"><span class=\"tag\">Prioridades<\u002Fspan><span class=\"tag\">Energia<\u002Fspan><span class=\"tag\">Prevenção de sobrecarga<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"enc reveal\">\n        <div class=\"node\">5<\u002Fdiv>\n        <div class=\"enc-card\">\n          <span class=\"enc-date\">Ter, 18 ago<\u002Fspan>\n          <h3>Autoliderança e Clareza de Propósito<\u002Fh3>\n          <p class=\"desc\">Liderar a si antes de liderar os outros. A diferença entre reagir e decidir; identidade, valores e propósito como guias de decisão. <em>Autoliderança não é controle; é consciência aplicada às decisões.<\u002Fem><\u002Fp>\n          <div class=\"enc-tags\"><span class=\"tag\">Autoliderança<\u002Fspan><span class=\"tag\">Propósito<\u002Fspan><span class=\"tag\">Valores<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"enc reveal\">\n        <div class=\"node\">6<\u002Fdiv>\n        <div class=\"enc-card\">\n          <span class=\"enc-date\">Qui, 20 ago<\u002Fspan>\n          <h3>Liderança Pessoal e Influência Positiva<\u002Fh3>\n          <p class=\"desc\">Liderança como influência cotidiana, pelo exemplo. Consciência de impacto, coerência e postura ética. Não controlamos pessoas — influenciamos ambientes. <em>Influência verdadeira nasce do caráter, não do cargo.<\u002Fem><\u002Fp>\n          <div class=\"enc-tags\"><span class=\"tag\">Influência<\u002Fspan><span class=\"tag\">Coerência<\u002Fspan><span class=\"tag\">Ética<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== METODOLOGIA ===================== -->\n<section class=\"sec deep\" data-screen-label=\"Metodologia e princípios\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"eyebrow\">Metodologia e princípios<\u002Fspan>\n      <h2>Um ambiente <em>seguro<\u002Fem> para crescer<\u002Fh2>\n      <p>Os princípios de valorização humana da Oliveira Foundation guiam cada encontro — práticos, reflexivos e progressivos, sempre ao vivo.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"princ-grid\">\n      <div class=\"princ reveal\"><div class=\"num\">01<\u002Fdiv><h3>Segurança emocional<\u002Fh3><p>Ambiente acolhedor, sem exposição forçada. Você participa no seu ritmo.<\u002Fp><\u002Fdiv>\n      <div class=\"princ reveal d1\"><div class=\"num\">02<\u002Fdiv><h3>Comunicação adulta<\u002Fh3><p>Diálogo maduro, direto e respeitoso — a base de toda relação saudável.<\u002Fp><\u002Fdiv>\n      <div class=\"princ reveal d2\"><div class=\"num\">03<\u002Fdiv><h3>Valorização humana<\u002Fh3><p>Cada pessoa é tratada com dignidade, escuta e consideração genuína.<\u002Fp><\u002Fdiv>\n      <div class=\"princ reveal\"><div class=\"num\">04<\u002Fdiv><h3>Prática, não terapia<\u002Fh3><p>Conteúdo aplicável à vida real — consciência que vira decisão e ação.<\u002Fp><\u002Fdiv>\n      <div class=\"princ reveal d1\"><div class=\"num\">05<\u002Fdiv><h3>Respeito às histórias<\u002Fh3><p>Cada trajetória importa. Nada de julgamento, espaço para a sua jornada.<\u002Fp><\u002Fdiv>\n      <div class=\"princ reveal d2\"><div class=\"num\">06<\u002Fdiv><h3>Responsabilidade<\u002Fh3><p>Crescimento é escolha. Você assume o protagonismo da própria transformação.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"metodo-note reveal d1\">\n      Encontros <strong>práticos e reflexivos<\u002Fstrong>, com conteúdo <strong>progressivo<\u002Fstrong> e <strong>ao vivo<\u002Fstrong>. Um espaço seguro, sem exposição forçada — para você desenvolver consciência, clareza e transformação no seu tempo.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== DETALHES ===================== -->\n<section class=\"sec\" data-screen-label=\"Detalhes do evento\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\" style=\"margin-bottom:46px;\">\n      <span class=\"eyebrow\">Detalhes do evento<\u002Fspan>\n      <h2>Tudo o que você precisa <em>saber<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"detail-card reveal d1\">\n      <div class=\"detail-row\">\n
